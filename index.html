<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>M3U Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --panel: #161616;
    --border: #2a2a2a;
    --accent: #ff5c28;
    --accent2: #ffb347;
    --text: #f0ede8;
    --muted: #666;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 4px;
  }
  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    margin-bottom: 36px;
    letter-spacing: 1px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 100%;
    max-width: 680px;
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 10px;
    font-family: 'Space Mono', monospace;
  }

  .url-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    align-items: center;
  }

  .url-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .url-row input:focus { border-color: var(--accent); }
  .url-row input::placeholder { color: var(--muted); }

  .url-row .name-in {
    width: 160px;
    flex: none;
  }

  .btn-remove {
    background: none;
    border: 1px solid #333;
    color: var(--muted);
    border-radius: 6px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .btn-remove:hover { border-color: var(--accent); color: var(--accent); }

  .row-labels {
    display: flex;
    gap: 10px;
    margin-bottom: 6px;
  }
  .row-labels span { font-size: 0.65rem; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); font-family: 'Space Mono', monospace; }
  .row-labels .lbl-name { width: 160px; flex: none; }
  .row-labels .lbl-url { flex: 1; }

  #add-btn {
    background: none;
    border: 1px dashed var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 10px;
    width: 100%;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    margin-top: 6px;
    transition: all 0.2s;
  }
  #add-btn:hover { border-color: var(--accent); color: var(--accent); }

  .paste-area {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--text);
    width: 100%;
    min-height: 100px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 10px;
  }
  .paste-area:focus { border-color: var(--accent); }

  #paste-btn {
    background: var(--border);
    border: none;
    color: var(--text);
    border-radius: 8px;
    padding: 9px 18px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    transition: background 0.2s;
  }
  #paste-btn:hover { background: #333; }

  #download-btn {
    background: var(--accent);
    border: none;
    color: #fff;
    border-radius: 10px;
    padding: 14px 32px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    width: 100%;
    max-width: 680px;
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.1s;
  }
  #download-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  #download-btn:active { transform: translateY(0); }

  .preview-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: #7a7;
    white-space: pre;
    overflow-x: auto;
    max-height: 200px;
    overflow-y: auto;
    width: 100%;
    max-width: 680px;
    margin-top: 16px;
    display: none;
  }

  .tip {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-top: 8px;
    line-height: 1.6;
  }
  .tip strong { color: var(--accent2); }
</style>
</head>
<body>

<h1>M3U <span>Generator</span></h1>
<p class="subtitle">// COPYPARTY PLAYLIST BUILDER</p>

<!-- Manual entry -->
<div class="card">
  <label>Add Songs Manually</label>
  <div class="row-labels">
    <span class="lbl-name">Song Name</span>
    <span class="lbl-url">URL (paste raw copyparty URL)</span>
  </div>
  <div id="rows"></div>
  <button id="add-btn">+ Add Song</button>
</div>

<!-- Paste bulk URLs -->
<div class="card">
  <label>Or Paste Multiple URLs (one per line)</label>
  <textarea class="paste-area" id="bulk-paste" placeholder="https://copyparty.examplle.com/New_Songs/Song1.mp3&#10;https://copyparty.examplle.com/New_Songs/Song2.mp3"></textarea>
  <button id="paste-btn">Import URLs</button>
  <p class="tip">Song names will be auto-extracted from the filename. URLs with spaces are auto-encoded.</p>
</div>

<button id="download-btn">⬇ Download playlist.m3u8</button>

<pre class="preview-box" id="preview"></pre>

<script>
  let songs = [{ name: '', url: '' }];

  const rowsEl = document.getElementById('rows');

  function encodeURL(url) {
    try {
      // If already a valid URL don't double encode
      new URL(url);
      // Encode only the path parts (spaces, etc.) but not the protocol/host
      const u = new URL(url);
      const encodedPath = u.pathname.split('/').map(p => encodeURIComponent(decodeURIComponent(p))).join('/');
      return u.origin + encodedPath + (u.search || '');
    } catch {
      return url.replace(/ /g, '%20');
    }
  }

  function nameFromURL(url) {
    try {
      const u = new URL(url);
      const parts = u.pathname.split('/');
      let file = decodeURIComponent(parts[parts.length - 1]);
      file = file.replace(/\.mp3$/i, '').replace(/_/g, ' ');
      return file;
    } catch {
      return 'Track';
    }
  }

  function addRawParam(url) {
    if (!url.includes('?raw') && !url.includes('&raw')) {
      return url.includes('?') ? url + '&raw' : url + '?raw';
    }
    return url;
  }

  function render() {
    rowsEl.innerHTML = '';
    songs.forEach((song, i) => {
      const div = document.createElement('div');
      div.className = 'url-row';
      div.innerHTML = `
        <input class="name-in" type="text" placeholder="Song name" value="${song.name}" data-i="${i}" data-field="name">
        <input type="text" placeholder="https://..." value="${song.url}" data-i="${i}" data-field="url">
        <button class="btn-remove" data-i="${i}">×</button>
      `;
      rowsEl.appendChild(div);
    });
    updatePreview();
  }

  rowsEl.addEventListener('input', e => {
    const i = e.target.dataset.i;
    const field = e.target.dataset.field;
    if (i !== undefined) {
      songs[i][field] = e.target.value;
      updatePreview();
    }
  });

  rowsEl.addEventListener('click', e => {
    if (e.target.classList.contains('btn-remove')) {
      const i = parseInt(e.target.dataset.i);
      songs.splice(i, 1);
      if (songs.length === 0) songs.push({ name: '', url: '' });
      render();
    }
  });

  document.getElementById('add-btn').addEventListener('click', () => {
    songs.push({ name: '', url: '' });
    render();
  });

  document.getElementById('paste-btn').addEventListener('click', () => {
    const lines = document.getElementById('bulk-paste').value.split('\n').map(l => l.trim()).filter(l => l.startsWith('http'));
    lines.forEach(url => {
      songs.push({ name: nameFromURL(url), url });
    });
    render();
  });

  function buildM3U() {
    let out = '#EXTM3U\n';
    songs.forEach(s => {
      if (!s.url.trim()) return;
      const name = s.name.trim() || nameFromURL(s.url);
      const url = addRawParam(encodeURL(s.url.trim()));
      out += `#EXTINF:-1,${name}\n${url}\n`;
    });
    return out;
  }

  function updatePreview() {
    const m3u = buildM3U();
    const pre = document.getElementById('preview');
    if (songs.some(s => s.url)) {
      pre.style.display = 'block';
      pre.textContent = m3u;
    } else {
      pre.style.display = 'none';
    }
  }

  document.getElementById('download-btn').addEventListener('click', () => {
    const content = buildM3U();
    const blob = new Blob([content], { type: 'audio/x-mpegurl' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'playlist.m3u8';
    a.click();
  });

  render();
</script>
</body>
</html>
